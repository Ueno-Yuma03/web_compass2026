<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="design.css">
  <title>Web Compass</title>
</head>
<body>
<div style="text-align: center;">
    <h1 style="text-align: center;">WEBコンパス</h1>
</div>
<div class="compass_wrapper">
  <div class="dial">
    <div class="circle"></div>
    <div class="circle1"></div>
    <svg class="fan-svg" viewBox="0 0 300 300">
      <path id="fanPath"></path>
    </svg>
    <svg class="ticks" viewBox="0 0 300 300"></svg>
    <div class="deg_labels"></div>
  </div>
  <div class="arrow"></div>
</div>
<p id="countdown"></p>
<button class="ripple-btn">開始</button>
<script src="app.js" defer></script>
<p id="ang_val"></p>
<p id="debug"></p>
</body>
</html>
