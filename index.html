<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="design.css">
  <title>Web Compass</title>
</head>
<body>
<div style="text-align: center;">
    <h1 style="text-align: center;">WEBコンパス</h1>
</div>
<div class="compass_wrapper">
  <div class="dial">
    <div class="circle"></div>
    <div class="circle1"></div>
    <div class="label north">N</div>
    <div class="label south">S</div>
    <div class="label east">E</div>
    <div class="label west">W</div>
  </div>
  <div class="arrow"></div>
</div>
<button class="ripple-btn">キャリブレーション</button>
<script src="app.js" defer></script>
<p id="ang_val"></p>
</body>
</html>
